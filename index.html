<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Anti-flash: aplica dark antes de qualquer paint -->
    <script>
      (function(){
        var t = localStorage.getItem('inovapro3d-theme');
        document.documentElement.classList.add(t === 'light' ? 'light' : 'dark');
        document.documentElement.dataset.theme = t === 'light' ? 'light' : 'dark';
      })();
    </script>

    <!-- Preconnect para fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fontes carregadas de forma não-bloqueante com display=optional (sem FOUT) -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Outfit:wght@100..900&family=JetBrains+Mono:wght@100..800&display=optional"
      onload="this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Outfit:wght@100..900&family=JetBrains+Mono:wght@100..800&display=optional" />
    </noscript>

    <!-- Identidade / PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#05070d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="INOVA PRO 3D" />

    <!-- SEO -->
    <title>INOVA PRO 3D — Tecnologia, Precisão e Inovação em Impressão 3D</title>
    <meta name="description" content="Impressão 3D profissional no Pará. Catálogo de produtos, orçamentos sob demanda e calculadora de custos com precisão de maker. Tecnologia, precisão e inovação." />

    <!-- Open Graph / compartilhamento -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="INOVA PRO 3D" />
    <meta property="og:title" content="INOVA PRO 3D — Impressão 3D Profissional" />
    <meta property="og:description" content="Tecnologia, precisão e inovação em impressão 3D. Catálogo, orçamentos e calculadora de custos." />
    <meta property="og:image" content="/logo-inovapro3d.png" />
    <meta property="og:url" content="https://inovapro3d.com.br/" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="INOVA PRO 3D — Impressão 3D Profissional" />
    <meta name="twitter:description" content="Tecnologia, precisão e inovação em impressão 3D. Catálogo, orçamentos e calculadora de custos." />
    <meta name="twitter:image" content="/logo-inovapro3d.png" />

    <!-- SendPulse Web Push -->
    <script charset="UTF-8" src="//web.webpushs.com/js/push/c645b41ef74d093572934565b95d5a28_1.js" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
